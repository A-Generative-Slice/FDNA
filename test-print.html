<!DOCTYPE html>
<html>
<head>
<style>
@media print {
    @page {
        size: 297mm 167mm;
        margin: 0;
    }
    body, html {
        margin: 0; padding: 0;
    }
    .slide {
        width: 297mm;
        height: 167mm;
        page-break-after: always;
        background: red;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
    }
}
</style>
</head>
<body>
    <div class="slide">Slide 1</div>
    <div class="slide">Slide 2</div>
</body>
</html>
